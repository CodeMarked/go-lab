services:
  mysql:
    image: mysql:8.4
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p${DB_PASS}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      API_PORT: "5000"
      # Backend listens on HTTP; browsers reject Set-Cookie with Secure without TLS.
      SESSION_COOKIE_SECURE: "false"
    depends_on:
      mysql:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/readyz"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "4200:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 20s
      timeout: 5s
      retries: 10

  migrate:
    image: migrate/migrate:v4.18.3
    env_file:
      - .env
    volumes:
      - ./migrations:/migrations
    entrypoint: ["migrate", "-path", "/migrations", "-database", "mysql://${DB_USER}:${DB_PASS}@tcp(mysql:3306)/${DB_NAME}"]
    command: ["up"]
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql-data:
