name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go_CRUD_api/go.mod

      - name: Run backend tests
        working-directory: go_CRUD_api
        run: go test ./...

  compose-smoke:
    runs-on: ubuntu-latest
    needs: backend-tests
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare env file
        run: cp .env.example .env

      - name: Build and start stack
        run: docker compose up -d --build

      - name: Run migrations
        run: docker compose run --rm migrate

      - name: Wait for backend health
        run: |
          for i in $(seq 1 30); do
            if curl -fsS "http://localhost:5000/readyz" > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Backend readiness check timed out"
          exit 1

      - name: Run smoke tests
        shell: pwsh
        run: ./scripts/test.ps1

      - name: Dump logs on failure
        if: failure()
        run: |
          docker compose ps
          docker compose logs backend --tail 200
          docker compose logs frontend --tail 200
          docker compose logs mysql --tail 200

      - name: Teardown
        if: always()
        run: docker compose down -v
